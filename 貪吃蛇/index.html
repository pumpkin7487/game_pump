<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>賽博霓虹貪吃蛇 - Cyberpunk Neon Snake</title>
    <meta name="description" content="升級版的賽博龐克霓虹貪吃蛇遊戲。具備 60fps 粒子動畫、漸層發光蛇身、呼吸脈動食物與 8-bit 電玩音效合成。">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Noto+Sans+TC:wght@500;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #030308;
            --bg-card: #090a12;
            --bg-button: #121324;
            --snake-green: #39ff14; /* 霓虹綠 */
            --neon-blue: #00f0ff;    /* 霓虹藍 */
            --neon-pink: #ff007f;    /* 霓虹粉 */
            --accent-gold: #ffb26b;
            --text-primary: #f8fafc;
            --text-secondary: #8b9bb4;
            --border: rgba(0, 240, 255, 0.15);
            --border-pink: rgba(255, 0, 127, 0.25);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            -webkit-user-select: none;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-primary);
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            padding: 1rem;
            position: relative;
        }

        /* Cyberpunk Ambient glowing backgrounds */
        .ambient-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            border-radius: 50%;
            pointer-events: none;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.5;
        }
        #glow-pink {
            background: radial-gradient(circle, rgba(255, 0, 127, 0.12) 0%, rgba(255, 0, 127, 0) 70%);
            top: 10%;
            left: 20%;
        }
        #glow-blue {
            background: radial-gradient(circle, rgba(0, 240, 255, 0.12) 0%, rgba(0, 240, 255, 0) 70%);
            bottom: 10%;
            right: 20%;
        }

        /* Main Game Wrapper */
        .game-wrapper {
            width: 100%;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 1.25rem;
            position: relative;
        }

        /* Cyberpunk Header Card */
        .game-header {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom: 2px solid var(--neon-blue);
            border-radius: 20px;
            padding: 1.2rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.05);
            position: relative;
            overflow: hidden;
        }

        .game-header::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, var(--neon-pink), var(--neon-blue));
        }

        .title-area h1 {
            font-size: 1.35rem;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(135deg, var(--neon-pink) 20%, var(--neon-blue) 80%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.1);
        }

        .scores-area {
            display: flex;
            gap: 1.5rem;
        }

        .score-box {
            display: flex;
            flex-direction: column;
            align-items: flex-end;
        }

        .score-label {
            font-size: 0.7rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.2rem;
        }

        .score-val {
            font-size: 1.4rem;
            font-weight: 900;
            color: var(--neon-blue);
            text-shadow: 0 0 10px rgba(0, 240, 255, 0.5);
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), color 0.2s;
        }

        .score-val.pop {
            transform: scale(1.4);
            color: #ffffff;
            text-shadow: 0 0 20px var(--neon-blue), 0 0 30px var(--neon-pink);
        }

        .score-val.high {
            color: var(--neon-pink);
            text-shadow: 0 0 10px rgba(255, 0, 127, 0.5);
        }

        /* Game Screen Container */
        .game-screen {
            position: relative;
            background: var(--bg-card);
            border: 1px solid var(--border-pink);
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.8);
            aspect-ratio: 1 / 1;
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background-color: #04050a;
        }

        /* Screen Shake Animation */
        @keyframes shake {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            10% { transform: translate(-3px, -2px) rotate(-0.5deg); }
            20% { transform: translate(3px, 2px) rotate(0.5deg); }
            30% { transform: translate(-3px, 1px) rotate(-0.5deg); }
            40% { transform: translate(2px, -1px) rotate(0.5deg); }
            50% { transform: translate(-2px, 2px) rotate(-0.5deg); }
            60% { transform: translate(3px, 1px) rotate(0.5deg); }
            70% { transform: translate(-1px, -1px) rotate(-0.5deg); }
            80% { transform: translate(2px, 2px) rotate(0.5deg); }
            90% { transform: translate(-2px, -2px) rotate(0deg); }
        }

        .game-screen.shake {
            animation: shake 0.3s ease-in-out;
        }

        /* Control Hints */
        .game-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.8rem;
            color: var(--neon-blue);
            background: rgba(4, 5, 10, 0.85);
            padding: 0.4rem 1.2rem;
            border-radius: 999px;
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            pointer-events: none;
            transition: opacity 0.3s;
            border: 1px solid var(--border);
            text-shadow: 0 0 5px rgba(0, 240, 255, 0.4);
            letter-spacing: 0.5px;
        }

        /* Cyber D-Pad Controls */
        .controller {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            width: 220px;
            margin: 0.5rem auto 0 auto;
        }

        .ctrl-btn {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 16px;
            height: 60px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
        }

        .ctrl-btn:active {
            transform: scale(0.92);
            background: var(--bg-button);
            border-color: var(--neon-blue);
            color: var(--neon-blue);
            box-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .ctrl-btn.up { grid-column: 2; border-color: rgba(0, 240, 255, 0.2); }
        .ctrl-btn.left { grid-column: 1; grid-row: 2; border-color: rgba(0, 240, 255, 0.2); }
        .ctrl-btn.down { grid-column: 2; grid-row: 2; border-color: rgba(0, 240, 255, 0.2); }
        .ctrl-btn.right { grid-column: 3; grid-row: 2; border-color: rgba(0, 240, 255, 0.2); }

        .ctrl-btn svg {
            width: 28px;
            height: 28px;
            fill: currentColor;
            filter: drop-shadow(0 0 4px currentColor);
        }

        /* Sound toggler */
        .sound-toggle {
            background: none;
            border: none;
            color: var(--text-secondary);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0.5rem;
            border-radius: 8px;
            transition: var(--transition);
        }

        .sound-toggle:hover {
            color: var(--neon-blue);
            background: rgba(255,255,255,0.03);
        }

        /* Game Over Slow Motion Modal */
        .modal-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(3, 3, 8, 0.88);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 1.2s ease-in-out; /* Slow motion fade out */
            z-index: 10;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-card {
            background: var(--bg-card);
            border: 2px solid var(--neon-pink);
            border-radius: 28px;
            padding: 3rem 2rem;
            width: 85%;
            max-width: 330px;
            text-align: center;
            box-shadow: 0 0 30px rgba(255, 0, 127, 0.3);
            transform: translateY(30px) scale(0.92);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal-overlay.active .modal-card {
            transform: translateY(0) scale(1);
        }

        .modal-card h2 {
            font-size: 2.1rem;
            font-weight: 900;
            color: var(--neon-pink);
            text-shadow: 0 0 15px rgba(255, 0, 127, 0.6);
            margin-bottom: 0.8rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
        }

        .modal-card p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            margin-bottom: 1.8rem;
        }

        .modal-scores {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 1.2rem;
            display: flex;
            justify-content: space-around;
            margin-bottom: 2.2rem;
        }

        .modal-score-box {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .modal-score-val {
            font-size: 1.6rem;
            font-weight: 900;
        }

        .modal-score-val.current { color: var(--neon-blue); text-shadow: 0 0 10px rgba(0, 240, 255, 0.4); }
        .modal-score-val.best { color: var(--accent-gold); text-shadow: 0 0 10px rgba(255, 178, 107, 0.4); }

        .btn-restart {
            width: 100%;
            background: linear-gradient(135deg, var(--neon-pink), #c000ff);
            border: none;
            border-radius: 16px;
            color: white;
            font-family: 'Orbitron', 'Noto Sans TC', sans-serif;
            font-size: 1.15rem;
            font-weight: 800;
            padding: 1rem;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            outline: none;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-restart:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 0, 127, 0.7);
        }

        .btn-restart:active {
            transform: translateY(0);
        }

        /* Keyboard hint footer */
        .footer-hint {
            text-align: center;
            font-size: 0.8rem;
            color: var(--text-secondary);
            margin-top: 0.5rem;
            letter-spacing: 0.5px;
        }

        /* Back to Map Button */
        .back-to-map {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            padding: 0.6rem 1.2rem;
            background: var(--bg-card);
            border: 1px solid var(--neon-blue);
            color: var(--neon-blue);
            border-radius: 999px;
            font-family: 'Noto Sans TC', sans-serif;
            font-size: 0.9rem;
            font-weight: 700;
            text-decoration: none;
            box-shadow: 0 0 10px rgba(0, 240, 255, 0.2);
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .back-to-map:hover {
            border-color: var(--neon-pink);
            color: var(--neon-pink);
            box-shadow: 0 0 15px rgba(255, 0, 127, 0.4);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <a href="../大冒險地圖/index.html" class="back-to-map">← 回到大地圖</a>

    <div id="certToast" style="position: fixed; top: 80px; left: 50%; transform: translateX(-50%) translateY(-20px); background: rgba(9, 10, 18, 0.95); border: 2px solid var(--neon-blue); color: var(--neon-blue); box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); padding: 0.8rem 1.5rem; border-radius: 12px; font-weight: bold; font-size: 0.95rem; z-index: 999; display: flex; align-items: center; gap: 0.5rem; opacity: 0; pointer-events: none; transition: all 0.3s ease;">
        🏆 獲得憑證：「蛇王之印」！
    </div>

    <div class="ambient-glow" id="glow-pink"></div>
    <div class="ambient-glow" id="glow-blue"></div>

    <div class="game-wrapper">
        
        <!-- Cyber Header -->
        <div class="game-header">
            <div class="title-area">
                <h1>Cyber Snake</h1>
            </div>
            
            <div style="display: flex; align-items: center; gap: 0.75rem;">
                <button class="sound-toggle" id="soundToggle" title="切換音效">
                    <svg id="soundOnIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
                    <svg id="soundOffIcon" width="20" height="20" viewBox="0 0 24 24" fill="currentColor" style="display:none;"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.21.05-.42.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
                </button>
                <div class="scores-area">
                    <div class="score-box">
                        <span class="score-label">Score</span>
                        <span class="score-val" id="scoreVal">0</span>
                    </div>
                    <div class="score-box">
                        <span class="score-label">Best</span>
                        <span class="score-val high" id="highScoreVal">0</span>
                    </div>
                </div>
            </div>
        </div>

        <!-- Game Canvas Screen -->
        <div class="game-screen" id="gameScreen">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            
            <div class="game-hint" id="gameHint">按方向鍵或任意鍵啟動系統</div>

            <!-- Game Over Screen Modal -->
            <div class="modal-overlay" id="gameOverModal">
                <div class="modal-card">
                    <h2>System Crash</h2>
                    <p>蛇蛇迴路短路，遊戲結束。</p>
                    <div class="modal-scores">
                        <div class="modal-score-box">
                            <span class="score-label">本次得分</span>
                            <span class="modal-score-val current" id="finalScoreVal">0</span>
                        </div>
                        <div class="modal-score-box">
                            <span class="score-label">最高紀錄</span>
                            <span class="modal-score-val best" id="finalBestVal">0</span>
                        </div>
                    </div>
                    <div id="certUnlocks" style="color: var(--neon-blue); font-size: 0.95rem; margin-bottom: 1.5rem; display: none; text-shadow: 0 0 5px var(--neon-blue); font-weight: bold; border: 1px dashed var(--neon-blue); padding: 0.5rem; border-radius: 8px; background: rgba(0, 240, 255, 0.05);">
                        🏆 成功取得「蛇王之印」憑證！
                    </div>
                    <button class="btn-restart" id="btnRestart">重啟系統</button>
                </div>
            </div>
        </div>

        <!-- Virtual controls -->
        <div class="controller">
            <button class="ctrl-btn up" id="ctrlUp" data-dir="UP">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M7.41 15.41L12 10.83l4.59 4.58L18 14l-6-6-6 6z"/></svg>
            </button>
            <button class="ctrl-btn left" id="ctrlLeft" data-dir="LEFT">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M15.41 16.59L10.83 12l4.58-4.59L14 6l-6 6 6 6z"/></svg>
            </button>
            <button class="ctrl-btn down" id="ctrlDown" data-dir="DOWN">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M7.41 8.59L12 13.17l4.59-4.58L18 10l-6 6-6-6z"/></svg>
            </button>
            <button class="ctrl-btn right" id="ctrlRight" data-dir="RIGHT">
                <svg width="24" height="24" viewBox="0 0 24 24"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
            </button>
        </div>

        <div class="footer-hint">
            可以使用鍵盤方向鍵 (↑ ↓ ← →) 或 WASD 操縱

    </div>

    <!-- JS Game Logic -->
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const gameScreen = document.getElementById('gameScreen');

        // Score elements
        const scoreVal = document.getElementById('scoreVal');
        const highScoreVal = document.getElementById('highScoreVal');
        const finalScoreVal = document.getElementById('finalScoreVal');
        const finalBestVal = document.getElementById('finalBestVal');
        const gameHint = document.getElementById('gameHint');
        const gameOverModal = document.getElementById('gameOverModal');

        // Buttons
        const btnRestart = document.getElementById('btnRestart');
        const soundToggle = document.getElementById('soundToggle');
        const soundOnIcon = document.getElementById('soundOnIcon');
        const soundOffIcon = document.getElementById('soundOffIcon');

        // Game Configuration
        const GRID_SIZE = 20; 
        const CELL_COUNT = 20; 
        
        let snake = [];
        let food = { x: 0, y: 0 };
        let direction = 'RIGHT';
        let nextDirection = 'RIGHT';
        let score = 0;
        let highScore = parseInt(localStorage.getItem('snakeHighScore') || '0');
        
        let gameActive = false;
        let speed = 110; // milliseconds per logic tick
        let lastTickTime = 0;
        let isSoundEnabled = true;

        // Visual FX Variables
        let intenseGlowTicks = 0;
        let particles = [];

        // Sound Synthesis setup
        let audioCtx = null;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx && audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // Web Audio Synthesized Sounds
        function playClickSound() {
            if (!isSoundEnabled) return;
            initAudio();
            if (!audioCtx) return;

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(900, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(1400, audioCtx.currentTime + 0.03);
            
            gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.001, audioCtx.currentTime + 0.04);
            
            osc.start();
            osc.stop(audioCtx.currentTime + 0.04);
        }

        function playEatSound() {
            if (!isSoundEnabled) return;
            initAudio();
            if (!audioCtx) return;
            
            const now = audioCtx.currentTime;
            
            // Primary upward glide oscillator
            const osc1 = audioCtx.createOscillator();
            const gain1 = audioCtx.createGain();
            osc1.connect(gain1);
            gain1.connect(audioCtx.destination);
            
            osc1.type = 'sine';
            osc1.frequency.setValueAtTime(350, now);
            osc1.frequency.exponentialRampToValueAtTime(800, now + 0.07);
            osc1.frequency.exponentialRampToValueAtTime(1600, now + 0.16);
            
            gain1.gain.setValueAtTime(0.06, now);
            gain1.gain.exponentialRampToValueAtTime(0.005, now + 0.18);
            
            // Sub-harmonic sine wave for punch
            const osc2 = audioCtx.createOscillator();
            const gain2 = audioCtx.createGain();
            osc2.connect(gain2);
            gain2.connect(audioCtx.destination);
            
            osc2.type = 'triangle';
            osc2.frequency.setValueAtTime(175, now);
            osc2.frequency.linearRampToValueAtTime(600, now + 0.12);
            
            gain2.gain.setValueAtTime(0.03, now);
            gain2.gain.linearRampToValueAtTime(0.001, now + 0.15);
            
            osc1.start(now);
            osc1.stop(now + 0.18);
            osc2.start(now);
            osc2.stop(now + 0.15);
        }

        function playCrashSound() {
            if (!isSoundEnabled) return;
            initAudio();
            if (!audioCtx) return;
            
            const now = audioCtx.currentTime;
            
            // Low rumble oscillator with LFO pitch vibrato
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(180, now);
            osc.frequency.linearRampToValueAtTime(25, now + 0.45);
            
            gain.gain.setValueAtTime(0.12, now);
            gain.gain.linearRampToValueAtTime(0.001, now + 0.48);
            
            const lfo = audioCtx.createOscillator();
            const lfoGain = audioCtx.createGain();
            lfo.frequency.value = 16;
            lfoGain.gain.value = 45;
            
            lfo.connect(lfoGain);
            lfoGain.connect(osc.frequency);
            
            osc.start(now);
            osc.stop(now + 0.48);
            lfo.start(now);
            lfo.stop(now + 0.48);
            
            // White-noise burst for distortion crash
            const bufferSize = audioCtx.sampleRate * 0.45;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const data = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                data[i] = Math.random() * 2 - 1;
            }
            
            const noise = audioCtx.createBufferSource();
            noise.buffer = buffer;
            
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'lowpass';
            filter.frequency.setValueAtTime(750, now);
            filter.frequency.exponentialRampToValueAtTime(80, now + 0.45);
            
            const noiseGain = audioCtx.createGain();
            noiseGain.gain.setValueAtTime(0.12, now);
            noiseGain.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
            
            noise.connect(filter);
            filter.connect(noiseGain);
            noiseGain.connect(audioCtx.destination);
            
            noise.start(now);
            noise.stop(now + 0.45);
        }

        // Initialize high score display
        highScoreVal.textContent = highScore;

        // Sound switch listener
        soundToggle.addEventListener('click', () => {
            isSoundEnabled = !isSoundEnabled;
            if (isSoundEnabled) {
                soundOnIcon.style.display = 'block';
                soundOffIcon.style.display = 'none';
                initAudio();
            } else {
                soundOnIcon.style.display = 'none';
                soundOffIcon.style.display = 'block';
            }
        });

        // Initialize Game Coordinates & Grid
        function initGame() {
            snake = [
                { x: 5, y: 10 },
                { x: 4, y: 10 },
                { x: 3, y: 10 }
            ];
            direction = 'RIGHT';
            nextDirection = 'RIGHT';
            score = 0;
            scoreVal.textContent = score;
            scoreVal.classList.remove('pop');
            intenseGlowTicks = 0;
            particles = [];
            spawnFood();
            gameHint.style.opacity = '1';
            gameOverModal.classList.remove('active');
        }

        function spawnFood() {
            let onSnake;
            do {
                onSnake = false;
                food.x = Math.floor(Math.random() * CELL_COUNT);
                food.y = Math.floor(Math.random() * CELL_COUNT);
                for (let part of snake) {
                    if (part.x === food.x && part.y === food.y) {
                        onSnake = true;
                        break;
                    }
                }
            } while (onSnake);
        }

        // Particle System Spawner
        function spawnEatParticles(gridX, gridY) {
            const px = gridX * GRID_SIZE + GRID_SIZE / 2;
            const py = gridY * GRID_SIZE + GRID_SIZE / 2;
            
            // Spawn 18 sparkling diamond particles
            for (let i = 0; i < 18; i++) {
                const angle = Math.random() * Math.PI * 2;
                const speed = 1.2 + Math.random() * 2.5;
                
                // Neon palette colors (green, pink, blue)
                const colors = [ '#ff007f', '#00f0ff', '#39ff14' ];
                const randColor = colors[Math.floor(Math.random() * colors.length)];

                particles.push({
                    x: px,
                    y: py,
                    vx: Math.cos(angle) * speed,
                    vy: Math.sin(angle) * speed,
                    size: 2.5 + Math.random() * 4,
                    color: randColor,
                    alpha: 1.0,
                    decay: 0.02 + Math.random() * 0.03
                });
            }
        }

        // Update Game Logic Tick
        function updateGameLogic() {
            direction = nextDirection;
            
            const head = { ...snake[0] };
            
            switch (direction) {
                case 'UP': head.y -= 1; break;
                case 'DOWN': head.y += 1; break;
                case 'LEFT': head.x -= 1; break;
                case 'RIGHT': head.x += 1; break;
            }

            // Collision checks
            if (head.x < 0 || head.x >= CELL_COUNT || head.y < 0 || head.y >= CELL_COUNT) {
                gameOver();
                return;
            }

            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) {
                    gameOver();
                    return;
                }
            }

            // Move forward
            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreVal.textContent = score;
                
                // 1. Score scale pop effect
                scoreVal.classList.add('pop');
                setTimeout(() => scoreVal.classList.remove('pop'), 200);

                // 2. Play synthesized digital sound
                playEatSound();

                // 3. Spawns sparkling neon particles
                spawnEatParticles(food.x, food.y);

                // 4. Temporarily make the snake glow intensively
                intenseGlowTicks = 6; 

                // Unlocked warrior cert?
                if (score >= 50 && !localStorage.getItem('cert_warrior')) {
                    localStorage.setItem('cert_warrior', 'true');
                    showCertUnlockToast();
                }

                // Respawn food
                spawnFood();
                adjustSpeed();
            } else {
                snake.pop();
            }

            // Decrement the temporary intense glow ticks
            if (intenseGlowTicks > 0) {
                intenseGlowTicks--;
            }
        }

        function adjustSpeed() {
            const baseSpeed = 110;
            const speedReduction = Math.min(60, Math.floor(score / 50) * 8);
            speed = baseSpeed - speedReduction;
        }

        function gameOver() {
            gameActive = false;
            
            // Play low rumble + crash explosion sound
            playCrashSound();
            
            // Screen Shake Effect
            gameScreen.classList.add('shake');
            setTimeout(() => gameScreen.classList.remove('shake'), 300);
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreVal.textContent = highScore;
            }
            
            finalScoreVal.textContent = score;
            finalBestVal.textContent = highScore;

            if (score >= 50) {
                localStorage.setItem('cert_warrior', 'true');
                document.getElementById('certUnlocks').style.display = 'block';
            } else {
                document.getElementById('certUnlocks').style.display = 'none';
            }
            
            // Slow motion fade-out: modal appears slowly after a short delay
            setTimeout(() => {
                gameOverModal.classList.add('active');
            }, 300);
        }

        function showCertUnlockToast() {
            const toast = document.getElementById('certToast');
            if (!toast) return;
            toast.style.opacity = '1';
            toast.style.transform = 'translateX(-50%) translateY(0)';
            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateX(-50%) translateY(-20px)';
            }, 3000);
        }

        // Smooth Interpolated Cyber Color Generator (Green -> Blue -> Pink)
        function getSnakeSegmentColor(i, total) {
            if (total <= 1) return '#39ff14';
            const ratio = i / (total - 1);
            
            const cGreen = [57, 255, 20];
            const cBlue = [0, 240, 255];
            const cPink = [255, 0, 127];
            
            let r, g, b;
            if (ratio < 0.5) {
                const subRatio = ratio * 2;
                r = Math.round(cGreen[0] + (cBlue[0] - cGreen[0]) * subRatio);
                g = Math.round(cGreen[1] + (cBlue[1] - cGreen[1]) * subRatio);
                b = Math.round(cGreen[2] + (cBlue[2] - cGreen[2]) * subRatio);
            } else {
                const subRatio = (ratio - 0.5) * 2;
                r = Math.round(cBlue[0] + (cPink[0] - cBlue[0]) * subRatio);
                g = Math.round(cBlue[1] + (cPink[1] - cBlue[1]) * subRatio);
                b = Math.round(cBlue[2] + (cPink[2] - cBlue[2]) * subRatio);
            }
            return `rgb(${r}, ${g}, ${b})`;
        }

        // Draw Game Objects (60fps)
        function draw(timestamp) {
            // Clear screen
            ctx.fillStyle = '#04050a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw a cybernetic background matrix grid (very subtle)
            ctx.strokeStyle = 'rgba(0, 240, 255, 0.02)';
            ctx.lineWidth = 1;
            for (let i = 0; i < CELL_COUNT; i++) {
                ctx.beginPath();
                ctx.moveTo(i * GRID_SIZE, 0);
                ctx.lineTo(i * GRID_SIZE, canvas.height);
                ctx.stroke();

                ctx.beginPath();
                ctx.moveTo(0, i * GRID_SIZE);
                ctx.lineTo(canvas.width, i * GRID_SIZE);
                ctx.stroke();
            }

            // Draw Snake Trail (A soft glowing path linking segments)
            if (snake.length > 1) {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(snake[0].x * GRID_SIZE + GRID_SIZE / 2, snake[0].y * GRID_SIZE + GRID_SIZE / 2);
                for (let i = 1; i < snake.length; i++) {
                    ctx.lineTo(snake[i].x * GRID_SIZE + GRID_SIZE / 2, snake[i].y * GRID_SIZE + GRID_SIZE / 2);
                }
                ctx.lineCap = 'round';
                ctx.lineJoin = 'round';
                ctx.lineWidth = GRID_SIZE - 4;
                ctx.strokeStyle = 'rgba(0, 240, 255, 0.08)';
                ctx.shadowColor = '#00f0ff';
                ctx.shadowBlur = 10;
                ctx.stroke();
                ctx.restore();
            }

            // Draw Snake Segments
            for (let i = 0; i < snake.length; i++) {
                const part = snake[i];
                const x = part.x * GRID_SIZE;
                const y = part.y * GRID_SIZE;
                const isHead = i === 0;

                ctx.save();

                // Compute gradient color along body
                const segColor = getSnakeSegmentColor(i, snake.length);
                ctx.fillStyle = segColor;
                ctx.shadowColor = segColor;

                // Adjust shadow based on current Intense Glow ticks
                if (intenseGlowTicks > 0) {
                    ctx.shadowBlur = 25; // Super high glow
                } else {
                    ctx.shadowBlur = isHead ? 15 : 6;
                }

                if (isHead) {
                    // Draw rounded head
                    fillRoundedRect(ctx, x + 1, y + 1, GRID_SIZE - 2, GRID_SIZE - 2, 6);
                    
                    // Eyes
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = '#030308';
                    if (direction === 'UP' || direction === 'DOWN') {
                        ctx.beginPath();
                        ctx.arc(x + 6, y + 10, 2.5, 0, Math.PI * 2);
                        ctx.arc(x + 14, y + 10, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    } else {
                        ctx.beginPath();
                        ctx.arc(x + 10, y + 6, 2.5, 0, Math.PI * 2);
                        ctx.arc(x + 10, y + 14, 2.5, 0, Math.PI * 2);
                        ctx.fill();
                    }
                } else {
                    // Draw tapered body segments (getting smaller towards the tail)
                    const reduction = (i / snake.length) * (GRID_SIZE * 0.45);
                    const size = GRID_SIZE - reduction;
                    const offset = reduction / 2;
                    fillRoundedRect(ctx, x + offset, y + offset, size, size, 4);
                }

                // If under intense glow, draw white overlay mask
                if (intenseGlowTicks > 0) {
                    ctx.shadowBlur = 0;
                    ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
                    fillRoundedRect(ctx, x + 2, y + 2, GRID_SIZE - 4, GRID_SIZE - 4, 4);
                }

                ctx.restore();
            }

            // Draw Pulsating Food (Neon Pink)
            const foodX = food.x * GRID_SIZE;
            const foodY = food.y * GRID_SIZE;
            
            ctx.save();
            ctx.fillStyle = '#ff007f';
            ctx.shadowColor = '#ff007f';
            
            // 3. Breathing pulsation speed
            const time = timestamp ? timestamp * 0.008 : Date.now() * 0.008;
            const pulse = 1 + Math.sin(time) * 0.16;
            
            ctx.shadowBlur = 15 * pulse;
            const r = ((GRID_SIZE - 4) / 2) * pulse;
            
            // Core
            ctx.beginPath();
            ctx.arc(foodX + GRID_SIZE / 2, foodY + GRID_SIZE / 2, r, 0, Math.PI * 2);
            ctx.fill();

            // Inner hot-core (White center)
            ctx.shadowBlur = 0;
            ctx.fillStyle = '#ffffff';
            ctx.beginPath();
            ctx.arc(foodX + GRID_SIZE / 2, foodY + GRID_SIZE / 2, r * 0.4, 0, Math.PI * 2);
            ctx.fill();

            ctx.restore();

            // Draw and Update Particles (60fps)
            drawParticles();
        }

        // Draw and Update Particles
        function drawParticles() {
            for (let i = particles.length - 1; i >= 0; i--) {
                const p = particles[i];
                p.x += p.vx;
                p.y += p.vy;
                p.alpha -= p.decay;

                if (p.alpha <= 0) {
                    particles.splice(i, 1);
                    continue;
                }

                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 10;

                // Diamond-star vector shapes
                ctx.beginPath();
                const size = p.size;
                ctx.moveTo(p.x, p.y - size);
                ctx.lineTo(p.x + size / 2, p.y - size / 2);
                ctx.lineTo(p.x + size, p.y);
                ctx.lineTo(p.x + size / 2, p.y + size / 2);
                ctx.lineTo(p.x, p.y + size);
                ctx.lineTo(p.x - size / 2, p.y + size / 2);
                ctx.lineTo(p.x - size, p.y);
                ctx.lineTo(p.x - size / 2, p.y - size / 2);
                ctx.closePath();
                ctx.fill();
                ctx.restore();
            }
        }

        // Rounded Rect Draw Helper
        function fillRoundedRect(context, x, y, width, height, radius) {
            context.beginPath();
            context.moveTo(x + radius, y);
            context.lineTo(x + width - radius, y);
            context.quadraticCurveTo(x + width, y, x + width, y + radius);
            context.lineTo(x + width, y + height - radius);
            context.quadraticCurveTo(x + width, y + height, x + width - radius, y + height);
            context.lineTo(x + radius, y + height - radius);
            context.quadraticCurveTo(x, y + height, x, y + height - radius);
            context.lineTo(x, y + radius);
            context.quadraticCurveTo(x, y, x + radius, y);
            context.closePath();
            context.fill();
        }

        // Command directional controls
        function changeDirection(newDir) {
            if (!gameActive) {
                startGame();
                return;
            }

            if (newDir === 'UP' && direction !== 'DOWN') nextDirection = 'UP';
            if (newDir === 'DOWN' && direction !== 'UP') nextDirection = 'DOWN';
            if (newDir === 'LEFT' && direction !== 'RIGHT') nextDirection = 'LEFT';
            if (newDir === 'RIGHT' && direction !== 'LEFT') nextDirection = 'RIGHT';
        }

        // Key listeners
        window.addEventListener('keydown', (e) => {
            const keys = {
                'ArrowUp': 'UP', 'w': 'UP', 'W': 'UP',
                'ArrowDown': 'DOWN', 's': 'DOWN', 'S': 'DOWN',
                'ArrowLeft': 'LEFT', 'a': 'LEFT', 'A': 'LEFT',
                'ArrowRight': 'RIGHT', 'd': 'RIGHT', 'D': 'RIGHT'
            };
            
            if (keys[e.key]) {
                e.preventDefault(); 
                playClickSound();
                changeDirection(keys[e.key]);
            }
        });

        // Click Virtual D-pad
        document.querySelectorAll('.ctrl-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                const dir = btn.getAttribute('data-dir');
                playClickSound();
                changeDirection(dir);
            });
        });

        function startGame() {
            if (gameActive) return;
            initAudio();
            gameActive = true;
            gameHint.style.opacity = '0';
            speed = 110;
            lastTickTime = performance.now();
        }

        btnRestart.addEventListener('click', () => {
            playClickSound();
            initGame();
            startGame();
        });

        // 60FPS Game loop using requestAnimationFrame
        function animationFrameLoop(timestamp) {
            if (gameActive) {
                const elapsed = timestamp - lastTickTime;
                if (elapsed >= speed) {
                    updateGameLogic();
                    lastTickTime = timestamp;
                }
            }
            
            draw(timestamp);
            requestAnimationFrame(animationFrameLoop);
        }

        // Start animation loop
        initGame();
        requestAnimationFrame(animationFrameLoop);
    </script>
</body>
</html>
